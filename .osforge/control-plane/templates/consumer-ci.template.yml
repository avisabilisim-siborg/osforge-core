name: OSForge Consumer Control Plane

# Canonical consumer CI adapter (CP1-A.1).
#
# Copy this file into the consumer repository as
# `.github/workflows/osforge-consumer-control-plane.yml` and replace only the
# three marked values. Do NOT copy any other control plane file: the policies,
# schemas and validators are read from the pinned osforge-core checkout, so a
# consumer can never drift away from the policy it claims to follow.
#
# Deterministic and free: no model is invoked, no secret is consumed, no write
# permission is requested, and nothing is merged, deployed or released.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege. Read is the only scope this contract permits.
permissions:
  contents: read

concurrency:
  group: osforge-consumer-control-plane-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  consumer-control-plane:
    name: Consumer control plane validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # REPLACE (1/3): nothing — the consumer checkout is always this shape.
      - name: Check out the consumer repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          path: consumer
          fetch-depth: 0
          persist-credentials: false

      # REPLACE (2/3): `repository` and `ref` must equal control_plane_repository
      # and control_plane_commit in `.osforge/project.json`. `ref` is the VERIFIED
      # full 40-character osforge-core merge commit sha of the control plane
      # version you adopted; a branch, `main`, a tag, `latest`, an abbreviated sha
      # and the placeholder below are all rejected by the canonical validator.
      - name: Check out the canonical control plane at its pinned commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          repository: avisabilisim-siborg/osforge-core
          ref: "REPLACE_WITH_VERIFIED_OSFORGE_CORE_MERGE_COMMIT_SHA"
          path: osforge-core
          fetch-depth: 0
          persist-credentials: false

      # REPLACE (3/3): pin the node version the consumer repository supports.
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24.15.0"

      # Every validation run is bound to an exact base and head. A run without a
      # base cannot prove that a declared existing product workflow is unchanged,
      # and cannot evaluate a change set at all, so the canonical validator now
      # refuses to grant a workflow baseline without one. Resolving the range here
      # keeps push, pull_request and workflow_dispatch on the identical contract.
      - name: Resolve the exact base and head commits
        id: range
        working-directory: consumer
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          if [ -n "${PR_BASE_SHA:-}" ]; then
            base="${PR_BASE_SHA}"
            head="${PR_HEAD_SHA}"
          else
            head="$(git rev-parse HEAD)"
            base="$(git rev-parse HEAD^)"
          fi
          echo "base=${base}" >> "${GITHUB_OUTPUT}"
          echo "head=${head}" >> "${GITHUB_OUTPUT}"

      - name: Canonical consumer project validation
        env:
          BASE_SHA: ${{ steps.range.outputs.base }}
          HEAD_SHA: ${{ steps.range.outputs.head }}
        run: |
          node "${GITHUB_WORKSPACE}/osforge-core/.osforge/control-plane/scripts/validate-consumer-project.mjs" \
            --repo-root "${GITHUB_WORKSPACE}/consumer" \
            --core-root "${GITHUB_WORKSPACE}/osforge-core" \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}"
