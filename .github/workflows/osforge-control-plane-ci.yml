name: OSForge Control Plane CI

# Deterministic, subscription-only verification of the control plane itself.
# This workflow never invokes a model, never writes to the repository and never
# performs a human-gated operation. Read-only by construction.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: read-only. No job requests any write scope.
permissions:
  contents: read

concurrency:
  group: control-plane-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "24.15.0"

jobs:
  control-plane:
    name: Control plane validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Actions are pinned to a full commit sha; the tag in the trailing comment
      # is human-readable metadata only.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Control plane structure and manifest contracts
        run: node .osforge/control-plane/scripts/validate-control-plane.mjs

      - name: Template manifests validate against their schemas
        run: |
          node .osforge/control-plane/scripts/validate-manifest.mjs task .osforge/control-plane/templates/task.template.json
          node .osforge/control-plane/scripts/validate-manifest.mjs audit .osforge/control-plane/templates/audit.template.json
          node .osforge/control-plane/scripts/validate-manifest.mjs approval .osforge/control-plane/templates/approval.template.json
          node .osforge/control-plane/scripts/validate-manifest.mjs state .osforge/control-plane/templates/state.template.json
          node .osforge/control-plane/scripts/validate-manifest.mjs project .osforge/control-plane/templates/project.template.json
          node .osforge/control-plane/scripts/validate-manifest.mjs version-lock .osforge/control-plane/templates/version-lock.template.json
          node .osforge/control-plane/scripts/validate-manifest.mjs project-path-policy .osforge/control-plane/templates/project-path-policy.template.json

      - name: Task manifests validate against their schema
        run: |
          for manifest in .osforge/tasks/*.task.json; do
            node .osforge/control-plane/scripts/validate-manifest.mjs task "$manifest"
          done

      - name: Human gate policy
        run: node .osforge/control-plane/scripts/check-human-gates.mjs --task .osforge/tasks/CP1-A1.task.json

      - name: Path policy against the real pull request diff
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          node .osforge/control-plane/scripts/check-path-policy.mjs --task .osforge/tasks/CP1-A1.task.json --base "$PR_BASE_SHA" --head HEAD

      - name: Subscription-only (no paid AI) scan
        run: node .osforge/control-plane/scripts/check-no-paid-ai.mjs

      - name: Workflow permission, event and behaviour scan
        run: node .osforge/control-plane/scripts/check-workflow-permissions.mjs

      - name: Instruction boundary and invariant equality
        run: node .osforge/control-plane/scripts/check-instruction-boundary.mjs

      - name: Prompt protocol consistency
        run: node .osforge/control-plane/scripts/check-prompt-consistency.mjs

      - name: Control plane unit tests
        run: node --test tests/control-plane-policy.test.mjs

      - name: Control plane adversarial tests
        run: node --test tests/control-plane-adversarial.test.mjs

      - name: Consumer interface tests (project, version lock, repo root, consumer CI)
        run: node --test tests/control-plane-consumer.test.mjs
